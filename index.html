<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>TaskFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet"/>
<style>
/* SAME CSS (UNCHANGED) */
</style>
</head>
<body>

<!-- AUTH SAME -->
<div id="auth-view">
  <div class="auth-box">
    <div class="auth-logo"><span>Task</span>Flow</div>
    <p class="auth-sub" id="auth-sub">Sign in to your workspace</p>
    <div class="auth-form">
      <input type="text" id="auth-name" placeholder="Full Name" style="display:none"/>
      <input type="email" id="auth-email" placeholder="Email address"/>
      <input type="password" id="auth-password" placeholder="Password"/>
      <button class="btn-primary" onclick="handleAuth()">Sign In</button>
    </div>
    <div class="auth-toggle">
      <span id="auth-toggle-text">Don't have an account? <a onclick="toggleMode()">Sign up</a></span>
    </div>
  </div>
</div>

<div id="app-view">
  <aside class="sidebar">
    <div>
      <div class="brand"><span class="brand-dot"></span> TaskFlow</div>
      <div class="nav-item active" onclick="switchView('dashboard')">▦ Dashboard</div>
      <div class="nav-item" onclick="switchView('calendar')">◷ Calendar</div>
      <div class="nav-item" onclick="switchView('settings')">◎ Settings</div>
    </div>
    <div class="user-card">
      <div class="avatar" id="user-avatar">U</div>
      <div>
        <div class="user-name" id="user-name">User</div>
        <button class="logout-btn" onclick="logout()">Log out</button>
      </div>
    </div>
  </aside>

  <main class="main-content">

    <!-- DASHBOARD -->
    <div id="dashboard-view">

      <div class="top-row">
        <div>
          <div class="greeting" id="greeting"></div>
          <div class="date-sub" id="date-sub"></div>
        </div>
      </div>

      <div class="progress-card">
        <div class="progress-head">
          <div>
            <div class="progress-label">Daily Progress</div>
            <div class="progress-caption" id="progress-caption"></div>
          </div>
          <div class="progress-pct" id="progress-pct">0%</div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="content-grid">
        <div class="panel">
          <div class="panel-title">Your Tasks</div>
          <div id="task-container"></div>
        </div>

        <div class="panel">
          <div class="panel-title">Add Task</div>
          <input id="task-title" placeholder="Task"/>
          <select id="task-priority">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
          <input type="date" id="task-date"/>
          <button onclick="addTask()">Add</button>
        </div>
      </div>

    </div>

    <!-- CALENDAR -->
    <div id="calendar-view" style="display:none">
      <div class="panel">
        <div class="panel-title">Calendar</div>
        <div id="calendar-content"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings-view" style="display:none">
      <div class="panel">
        <div class="panel-title">Settings</div>
        <p>Coming soon...</p>
      </div>
    </div>

  </main>
</div>

<script>
let currentUser=null,tasks=[],signUpMode=false;

/* NAV FIX */
function switchView(view){
  document.getElementById('dashboard-view').style.display=view==='dashboard'?'block':'none';
  document.getElementById('calendar-view').style.display=view==='calendar'?'block':'none';
  document.getElementById('settings-view').style.display=view==='settings'?'block':'none';

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

  if(view==='dashboard') document.querySelectorAll('.nav-item')[0].classList.add('active');
  if(view==='calendar') document.querySelectorAll('.nav-item')[1].classList.add('active');
  if(view==='settings') document.querySelectorAll('.nav-item')[2].classList.add('active');

  if(view==='calendar') renderCalendar();
}

/* AUTH */
function toggleMode(){signUpMode=!signUpMode}
function handleAuth(){
  const email=document.getElementById('auth-email').value;
  currentUser={name:email.split('@')[0],email};
  localStorage.setItem('user',JSON.stringify(currentUser));
  showApp();
}
function showApp(){
  document.getElementById('auth-view').style.display='none';
  document.getElementById('app-view').style.display='grid';
  document.getElementById('user-name').textContent=currentUser.name;
  loadTasks();
}

/* TASKS */
function addTask(){
  const title=document.getElementById('task-title').value;
  tasks.push({title,date:document.getElementById('task-date').value});
  save();render();
}
function save(){localStorage.setItem('tasks',JSON.stringify(tasks))}
function loadTasks(){tasks=JSON.parse(localStorage.getItem('tasks')||'[]');render()}

/* RENDER */
function render(){
  const c=document.getElementById('task-container');
  c.innerHTML=tasks.map(t=>`<div>${t.title}</div>`).join('');
}

/* CALENDAR */
function renderCalendar(){
  const c=document.getElementById('calendar-content');
  let map={};
  tasks.forEach(t=>{
    if(!map[t.date]) map[t.date]=[];
    map[t.date].push(t.title);
  });

  c.innerHTML=Object.keys(map).map(d=>`<b>${d}</b><br>${map[d].join('<br>')}`).join('<br><br>');
}
</script>

</body>
</html>
